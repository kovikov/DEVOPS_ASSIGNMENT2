name: CI-CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Fail workflow if EC2 is unreachable over SSH"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      use_ssm_deploy:
        description: "Deploy via AWS SSM (no SSH required)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: lamp-demo
  IMAGE_TAG: latest

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install Flask

      - name: Run smoke tests
        run: python .github/scripts/smoke_test.py

  terraform_validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        env:
          TF_VAR_my_ip_cidr: 203.0.113.10/32
          TF_VAR_mysql_app_password: CIValidatePassword123!
          TF_VAR_docker_image: docker.io/library/alpine:latest
        run: terraform validate

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, terraform_validate]
    outputs:
      registry_mode: ${{ steps.resolve_registry.outputs.registry_mode }}
      image_repo: ${{ steps.resolve_registry.outputs.image_repo }}
      image_tag: ${{ steps.resolve_registry.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image registry
        id: resolve_registry
        run: |
          USE_DOCKERHUB="${{ vars.USE_DOCKERHUB }}"

          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          elif [ -n "${{ vars.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            DOCKERHUB_USERNAME="${{ vars.DOCKERHUB_USERNAME }}"
          else
            DOCKERHUB_USERNAME=""
          fi

          if [ "$USE_DOCKERHUB" = "true" ]; then
            test -n "$DOCKERHUB_USERNAME" || { echo "USE_DOCKERHUB=true but DOCKERHUB_USERNAME is missing"; exit 1; }
            test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "USE_DOCKERHUB=true but DOCKERHUB_TOKEN is missing"; exit 1; }
            REGISTRY_MODE="dockerhub"
            IMAGE_REPO="$DOCKERHUB_USERNAME/${{ env.IMAGE_NAME }}"
          else
            OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
            REGISTRY_MODE="ghcr"
            IMAGE_REPO="ghcr.io/$OWNER_LC/${{ env.IMAGE_NAME }}"
          fi

          echo "REGISTRY_MODE=$REGISTRY_MODE" >> "$GITHUB_ENV"
          echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" >> "$GITHUB_ENV"
          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_ENV"

          echo "registry_mode=$REGISTRY_MODE" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        if: env.REGISTRY_MODE == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: env.REGISTRY_MODE == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true' }}
      USE_SSM_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_ssm_deploy || vars.USE_SSM_DEPLOY || 'false' }}
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Resolve deploy mode
        id: deploy_mode
        env:
          WEB_SERVER_INSTANCE_ID: ${{ secrets.WEB_SERVER_INSTANCE_ID != '' && secrets.WEB_SERVER_INSTANCE_ID || vars.WEB_SERVER_INSTANCE_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ "$USE_SSM_DEPLOY" = "true" ] && [ -n "$WEB_SERVER_INSTANCE_ID" ] && [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "ssm_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ssm_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (SSM mode)
        if: steps.deploy_mode.outputs.ssm_ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Deploy application container via SSM
        if: steps.deploy_mode.outputs.ssm_ready == 'true'
        env:
          WEB_SERVER_INSTANCE_ID: ${{ secrets.WEB_SERVER_INSTANCE_ID != '' && secrets.WEB_SERVER_INSTANCE_ID || vars.WEB_SERVER_INSTANCE_ID }}
          DB_HOST: ${{ secrets.DB_HOST != '' && secrets.DB_HOST || vars.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME != '' && secrets.DB_NAME || vars.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER != '' && secrets.DB_USER || vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD != '' && secrets.DB_PASSWORD || vars.DB_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REGISTRY_MODE: ${{ needs.build.outputs.registry_mode }}
          IMAGE_REPO: ${{ needs.build.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          test -n "$WEB_SERVER_INSTANCE_ID" || { echo "WEB_SERVER_INSTANCE_ID is not set"; exit 1; }
          test -n "$DB_HOST" || { echo "DB_HOST is not set"; exit 1; }
          test -n "$DB_NAME" || { echo "DB_NAME is not set"; exit 1; }
          test -n "$DB_USER" || { echo "DB_USER is not set"; exit 1; }
          test -n "$DB_PASSWORD" || { echo "DB_PASSWORD is not set"; exit 1; }
          test -n "$IMAGE_REPO" || { echo "IMAGE_REPO is not set"; exit 1; }
          test -n "$IMAGE_TAG" || { echo "IMAGE_TAG is not set"; exit 1; }

          python - <<'PY'
          import json
          import os
          import shlex

          image_ref = f"{os.environ['IMAGE_REPO']}:{os.environ['IMAGE_TAG']}"
          db_host = os.environ['DB_HOST']
          db_name = os.environ['DB_NAME']
          db_user = os.environ['DB_USER']
          db_password = os.environ['DB_PASSWORD']
          registry_mode = os.environ['REGISTRY_MODE']
          dockerhub_username = os.environ.get('DOCKERHUB_USERNAME', '')
          dockerhub_token = os.environ.get('DOCKERHUB_TOKEN', '')
          ghcr_username = os.environ['GHCR_USERNAME']
          ghcr_token = os.environ['GHCR_TOKEN']

          env_file = "\n".join([
              f"DB_HOST={db_host}",
              "DB_PORT=3306",
              f"DB_NAME={db_name}",
              f"DB_USER={db_user}",
              f"DB_PASSWORD={db_password}",
              "FLASK_ENV=production",
          ])

          if registry_mode == "dockerhub":
              login_cmd = (
                  f"test -n {shlex.quote(dockerhub_username)} || {{ echo 'DOCKERHUB_USERNAME is not set'; exit 1; }}; "
                  f"test -n {shlex.quote(dockerhub_token)} || {{ echo 'DOCKERHUB_TOKEN is not set'; exit 1; }}; "
                  f"echo {shlex.quote(dockerhub_token)} | sudo docker login -u {shlex.quote(dockerhub_username)} --password-stdin"
              )
          else:
              login_cmd = (
                  f"echo {shlex.quote(ghcr_token)} | sudo docker login ghcr.io -u {shlex.quote(ghcr_username)} --password-stdin"
              )

          commands = [
              "set -euxo pipefail",
              login_cmd,
              f"sudo docker pull {shlex.quote(image_ref)}",
              "sudo docker rm -f lamp-app || true",
              "cat >/tmp/lamp-app.env <<'ENVEOF'\n" + env_file + "\nENVEOF",
              "sudo mv /tmp/lamp-app.env /opt/lamp-app.env",
              "sudo chmod 600 /opt/lamp-app.env",
              "sudo chown root:root /opt/lamp-app.env",
              f"sudo docker run -d --name lamp-app --restart unless-stopped -p 5000:5000 --env-file /opt/lamp-app.env {shlex.quote(image_ref)}",
              "for attempt in 1 2 3 4 5 6; do curl -fsS http://localhost/health >/dev/null && break; if [ \"$attempt\" -eq 6 ]; then echo \"Health check failed after retries\"; sudo docker logs --tail 120 lamp-app || true; exit 1; fi; sleep 5; done",
          ]

          with open("ssm-params.json", "w", encoding="utf-8") as file:
              json.dump({"commands": commands}, file)
          PY

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$WEB_SERVER_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "CI deploy lamp app" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$WEB_SERVER_INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$WEB_SERVER_INSTANCE_ID" --query "Status" --output text)
          STDOUT=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$WEB_SERVER_INSTANCE_ID" --query "StandardOutputContent" --output text)
          STDERR=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$WEB_SERVER_INSTANCE_ID" --query "StandardErrorContent" --output text)

          echo "$STDOUT"
          if [ "$STATUS" != "Success" ]; then
            echo "$STDERR"
            exit 1
          fi

      - name: Fallback notice (SSM not ready)
        if: env.USE_SSM_DEPLOY == 'true' && steps.deploy_mode.outputs.ssm_ready != 'true'
        run: |
          echo "USE_SSM_DEPLOY=true but required SSM secrets/instance id are missing. Falling back to SSH deploy path."
          echo "Required: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, WEB_SERVER_INSTANCE_ID"

      - name: Configure SSH key
        if: steps.deploy_mode.outputs.ssm_ready != 'true'
        env:
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_SSH_KEY" || { echo "EC2_SSH_KEY is not set"; exit 1; }
          test -n "$WEB_SERVER_IP" || { echo "WEB_SERVER_IP is not set (add as secret or variable)"; exit 1; }
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/lamp-key.pem
          chmod 600 ~/.ssh/lamp-key.pem
          ssh-keyscan -T 10 -H "$WEB_SERVER_IP" >> ~/.ssh/known_hosts || true

      - name: Check SSH reachability
        if: steps.deploy_mode.outputs.ssm_ready != 'true'
        id: ssh_check
        env:
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
        run: |
          if timeout 8 bash -c "</dev/tcp/$WEB_SERVER_IP/22"; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy application container
        if: steps.deploy_mode.outputs.ssm_ready != 'true' && steps.ssh_check.outputs.reachable == 'true'
        env:
          EC2_USER: ${{ vars.EC2_USER != '' && vars.EC2_USER || secrets.EC2_USER }}
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
          DB_HOST: ${{ secrets.DB_HOST != '' && secrets.DB_HOST || vars.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME != '' && secrets.DB_NAME || vars.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER != '' && secrets.DB_USER || vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD != '' && secrets.DB_PASSWORD || vars.DB_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REGISTRY_MODE: ${{ needs.build.outputs.registry_mode }}
          IMAGE_REPO: ${{ needs.build.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          test -n "$EC2_USER" || { echo "EC2_USER is not set"; exit 1; }
          test -n "$WEB_SERVER_IP" || { echo "WEB_SERVER_IP is not set"; exit 1; }
          test -n "$DB_HOST" || { echo "DB_HOST is not set"; exit 1; }
          test -n "$DB_NAME" || { echo "DB_NAME is not set"; exit 1; }
          test -n "$DB_USER" || { echo "DB_USER is not set"; exit 1; }
          test -n "$DB_PASSWORD" || { echo "DB_PASSWORD is not set"; exit 1; }
          test -n "$IMAGE_REPO" || { echo "IMAGE_REPO is not set"; exit 1; }
          test -n "$IMAGE_TAG" || { echo "IMAGE_TAG is not set"; exit 1; }
          IMAGE_REF="$IMAGE_REPO:$IMAGE_TAG"

          ssh -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/lamp-key.pem "$EC2_USER@$WEB_SERVER_IP" <<EOF
            set -euxo pipefail

            if [ "$REGISTRY_MODE" = "dockerhub" ]; then
              test -n "$DOCKERHUB_USERNAME" || { echo "DOCKERHUB_USERNAME is not set"; exit 1; }
              test -n "$DOCKERHUB_TOKEN" || { echo "DOCKERHUB_TOKEN is not set"; exit 1; }
              echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            else
              echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            sudo docker pull "$IMAGE_REF"
            sudo docker rm -f lamp-app || true

            sudo tee /opt/lamp-app.env >/dev/null <<ENVEOF
            DB_HOST=$DB_HOST
            DB_PORT=3306
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            FLASK_ENV=production
            ENVEOF

            sudo chmod 600 /opt/lamp-app.env
            sudo chown root:root /opt/lamp-app.env

            sudo docker run -d \
              --name lamp-app \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file /opt/lamp-app.env \
              "$IMAGE_REF"

            for attempt in 1 2 3 4 5 6; do
              curl -fsS http://localhost/health >/dev/null && break
              if [ "$attempt" -eq 6 ]; then
                echo "Health check failed after retries"
                sudo docker logs --tail 120 lamp-app || true
                exit 1
              fi
              sleep 5
            done
          EOF

      - name: Skip deploy (SSH unreachable)
        if: steps.deploy_mode.outputs.ssm_ready != 'true' && steps.ssh_check.outputs.reachable != 'true' && env.FORCE_DEPLOY != 'true'
        env:
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
        run: |
          echo "Skipping deploy because $WEB_SERVER_IP:22 is unreachable from this GitHub runner."
          echo "Open inbound SSH on the web server security group for GitHub runner IPs or temporarily allow 0.0.0.0/0 on port 22, then rerun."

      - name: Fail deploy (SSH unreachable with force)
        if: steps.deploy_mode.outputs.ssm_ready != 'true' && steps.ssh_check.outputs.reachable != 'true' && env.FORCE_DEPLOY == 'true'
        env:
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
        run: |
          echo "force_deploy=true and $WEB_SERVER_IP:22 is unreachable from this GitHub runner."
          echo "Fix SSH access and rerun."
          exit 1
