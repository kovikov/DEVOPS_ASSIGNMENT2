name: CI-CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: lamp-demo
  IMAGE_TAG: latest

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install Flask

      - name: Run smoke tests
        run: python .github/scripts/smoke_test.py

  terraform_validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        env:
          TF_VAR_my_ip_cidr: 203.0.113.10/32
          TF_VAR_mysql_app_password: CIValidatePassword123!
          TF_VAR_docker_image: docker.io/library/alpine:latest
        run: terraform validate

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, terraform_validate]
    outputs:
      registry_mode: ${{ steps.resolve_registry.outputs.registry_mode }}
      image_repo: ${{ steps.resolve_registry.outputs.image_repo }}
      image_tag: ${{ steps.resolve_registry.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image registry
        id: resolve_registry
        run: |
          USE_DOCKERHUB="${{ vars.USE_DOCKERHUB }}"

          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          elif [ -n "${{ vars.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            DOCKERHUB_USERNAME="${{ vars.DOCKERHUB_USERNAME }}"
          else
            DOCKERHUB_USERNAME=""
          fi

          if [ "$USE_DOCKERHUB" = "true" ]; then
            test -n "$DOCKERHUB_USERNAME" || { echo "USE_DOCKERHUB=true but DOCKERHUB_USERNAME is missing"; exit 1; }
            test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "USE_DOCKERHUB=true but DOCKERHUB_TOKEN is missing"; exit 1; }
            REGISTRY_MODE="dockerhub"
            IMAGE_REPO="$DOCKERHUB_USERNAME/${{ env.IMAGE_NAME }}"
          else
            OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
            REGISTRY_MODE="ghcr"
            IMAGE_REPO="ghcr.io/$OWNER_LC/${{ env.IMAGE_NAME }}"
          fi

          echo "REGISTRY_MODE=$REGISTRY_MODE" >> "$GITHUB_ENV"
          echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" >> "$GITHUB_ENV"
          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_ENV"

          echo "registry_mode=$REGISTRY_MODE" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        if: env.REGISTRY_MODE == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: env.REGISTRY_MODE == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure SSH key
        env:
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_SSH_KEY" || { echo "EC2_SSH_KEY is not set"; exit 1; }
          test -n "$WEB_SERVER_IP" || { echo "WEB_SERVER_IP is not set (add as secret or variable)"; exit 1; }
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/lamp-key.pem
          chmod 600 ~/.ssh/lamp-key.pem
          ssh-keyscan -T 10 -H "$WEB_SERVER_IP" >> ~/.ssh/known_hosts || true

      - name: Check SSH reachability
        id: ssh_check
        env:
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
        run: |
          if timeout 8 bash -c "</dev/tcp/$WEB_SERVER_IP/22"; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy application container
        if: steps.ssh_check.outputs.reachable == 'true'
        env:
          EC2_USER: ${{ vars.EC2_USER != '' && vars.EC2_USER || secrets.EC2_USER }}
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
          DB_HOST: ${{ secrets.DB_HOST != '' && secrets.DB_HOST || vars.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME != '' && secrets.DB_NAME || vars.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER != '' && secrets.DB_USER || vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD != '' && secrets.DB_PASSWORD || vars.DB_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REGISTRY_MODE: ${{ needs.build.outputs.registry_mode }}
          IMAGE_REPO: ${{ needs.build.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          test -n "$EC2_USER" || { echo "EC2_USER is not set"; exit 1; }
          test -n "$WEB_SERVER_IP" || { echo "WEB_SERVER_IP is not set"; exit 1; }
          test -n "$DB_HOST" || { echo "DB_HOST is not set"; exit 1; }
          test -n "$DB_NAME" || { echo "DB_NAME is not set"; exit 1; }
          test -n "$DB_USER" || { echo "DB_USER is not set"; exit 1; }
          test -n "$DB_PASSWORD" || { echo "DB_PASSWORD is not set"; exit 1; }
          test -n "$IMAGE_REPO" || { echo "IMAGE_REPO is not set"; exit 1; }
          test -n "$IMAGE_TAG" || { echo "IMAGE_TAG is not set"; exit 1; }
          IMAGE_REF="$IMAGE_REPO:$IMAGE_TAG"

          ssh -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/lamp-key.pem "$EC2_USER@$WEB_SERVER_IP" <<EOF
            set -euxo pipefail

            if [ "$REGISTRY_MODE" = "dockerhub" ]; then
              test -n "$DOCKERHUB_USERNAME" || { echo "DOCKERHUB_USERNAME is not set"; exit 1; }
              test -n "$DOCKERHUB_TOKEN" || { echo "DOCKERHUB_TOKEN is not set"; exit 1; }
              echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            else
              echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            sudo docker pull "$IMAGE_REF"
            sudo docker rm -f lamp-app || true

            sudo tee /opt/lamp-app.env >/dev/null <<ENVEOF
            DB_HOST=$DB_HOST
            DB_PORT=3306
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            FLASK_ENV=production
            ENVEOF

            sudo chmod 600 /opt/lamp-app.env
            sudo chown root:root /opt/lamp-app.env

            sudo docker run -d \
              --name lamp-app \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file /opt/lamp-app.env \
              "$IMAGE_REF"

            for attempt in 1 2 3 4 5 6; do
              curl -fsS http://localhost/health >/dev/null && break
              if [ "$attempt" -eq 6 ]; then
                echo "Health check failed after retries"
                sudo docker logs --tail 120 lamp-app || true
                exit 1
              fi
              sleep 5
            done
          EOF

      - name: Skip deploy (SSH unreachable)
        if: steps.ssh_check.outputs.reachable != 'true'
        env:
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP != '' && secrets.WEB_SERVER_IP || vars.WEB_SERVER_IP }}
        run: |
          echo "Skipping deploy because $WEB_SERVER_IP:22 is unreachable from this GitHub runner."
          echo "Open inbound SSH on the web server security group for GitHub runner IPs or temporarily allow 0.0.0.0/0 on port 22, then rerun."
