name: CI-CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: lamp-demo
  IMAGE_TAG: latest
  DOCKERHUB_USERNAME: kovikov1978

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install Flask

      - name: Run smoke tests
        run: python .github/scripts/smoke_test.py

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/lamp-key.pem
          chmod 600 ~/.ssh/lamp-key.pem
          ssh-keyscan -H "${{ secrets.WEB_SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy application container
        env:
          EC2_USER: ${{ vars.EC2_USER }}
          WEB_SERVER_IP: ${{ secrets.WEB_SERVER_IP }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/lamp-key.pem "$EC2_USER@$WEB_SERVER_IP" <<EOF
            set -euxo pipefail

            echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            sudo docker pull "$DOCKERHUB_USERNAME/lamp-demo:latest"
            sudo docker rm -f lamp-app || true

            sudo tee /opt/lamp-app.env >/dev/null <<ENVEOF
            DB_HOST=$DB_HOST
            DB_PORT=3306
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            FLASK_ENV=production
            ENVEOF

            sudo chmod 600 /opt/lamp-app.env
            sudo chown root:root /opt/lamp-app.env

            sudo docker run -d \
              --name lamp-app \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file /opt/lamp-app.env \
              "$DOCKERHUB_USERNAME/lamp-demo:latest"

            sleep 8
            curl -fsS http://localhost/health >/dev/null
          EOF
